<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ВИДЕО — Делись моментами</title>
<meta name="description" content="Видеоплатформа — ВКонтакте и прямые видео">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ВИДЕО">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Mulish:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1c1c2a;
    --border: #2a2a3d;
    --accent: #ff3b6b;
    --accent2: #a259ff;
    --text: #f0f0f8;
    --muted: #7070a0;
    --gradient: linear-gradient(135deg, #ff3b6b, #a259ff);
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Mulish', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999;
  }

  /* ── PWA BANNER ── */
  #pwaBanner {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 1rem 1.5rem;
    z-index: 8000;
    flex-direction: row;
    align-items: center;
    gap: 1rem;
    animation: slideUp 0.4s ease;
  }
  #pwaBanner.show { display: flex; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .pwa-icon { font-size: 2rem; flex-shrink: 0; }
  .pwa-text { flex: 1; }
  .pwa-text strong { display: block; font-family: 'Unbounded', sans-serif; font-size: 0.8rem; }
  .pwa-text span { font-size: 0.75rem; color: var(--muted); }
  .pwa-btns { display: flex; gap: 0.5rem; flex-shrink: 0; }
  .btn-pwa-install {
    background: var(--gradient);
    color: #fff; border: none;
    border-radius: 999px;
    padding: 0.5rem 1.2rem;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.65rem; font-weight: 700;
    cursor: pointer; white-space: nowrap;
  }
  .btn-pwa-dismiss {
    background: var(--surface2);
    color: var(--muted); border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.5rem 0.9rem;
    font-size: 0.75rem; cursor: pointer;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.88);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    display: flex; align-items: center; gap: 1rem;
    height: 60px;
  }
  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.2rem; font-weight: 900;
    background: var(--gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: -1px; white-space: nowrap;
  }
  .search-wrap { flex: 1; max-width: 480px; }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.45rem 1.1rem;
    color: var(--text);
    font-family: 'Mulish', sans-serif; font-size: 0.88rem;
    outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap input::placeholder { color: var(--muted); }
  .btn-add {
    background: var(--gradient);
    color: #fff; border: none; border-radius: 999px;
    padding: 0.5rem 1.3rem;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.68rem; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    transition: opacity 0.2s, transform 0.15s; margin-left: auto;
  }
  .btn-add:hover { opacity: 0.9; transform: scale(1.04); }

  /* ── HERO ── */
  .hero {
    padding: 3rem 1.5rem 2rem;
    text-align: center; position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(162,89,255,0.13) 0%, transparent 70%);
    top: -180px; left: 50%; transform: translateX(-50%);
    pointer-events: none;
  }
  .hero h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(1.8rem, 5vw, 3.5rem); font-weight: 900;
    line-height: 1.1;
    background: var(--gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.7rem;
  }
  .hero p { color: var(--muted); font-size: 0.95rem; max-width: 380px; margin: 0 auto; }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 0.4rem;
    padding: 0 1.5rem 1.5rem;
    overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; padding: 0.38rem 1rem;
    font-size: 0.78rem; color: var(--muted);
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .tab:hover { border-color: var(--accent2); color: var(--text); }
  .tab.active { background: var(--gradient); border-color: transparent; color: #fff; font-weight: 600; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.2rem; padding: 0 1.5rem 6rem;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    cursor: pointer; animation: fadeUp 0.45s ease both;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--accent2); box-shadow: 0 14px 36px rgba(162,89,255,0.13); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

  .thumb { position: relative; aspect-ratio: 16/9; background: var(--surface2); overflow: hidden; }
  .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .thumb-placeholder {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-size:2.5rem;
    background: linear-gradient(135deg, var(--surface2), #1a1a28);
  }
  .play-over {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.28); opacity:0; transition:opacity 0.2s;
  }
  .card:hover .play-over { opacity:1; }
  .play-circle {
    width:52px; height:52px; border-radius:50%;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    border:2px solid rgba(255,255,255,0.4);
  }
  .play-circle svg { width:22px; height:22px; fill:#fff; margin-left:3px; }
  .badge {
    position:absolute; top:8px; right:8px;
    border-radius:6px; padding:2px 8px;
    font-size:0.62rem; font-weight:700;
    letter-spacing:0.5px; text-transform:uppercase;
  }
  .badge-vk { background:#0077ff; color:#fff; }
  .badge-link { background:var(--accent); color:#fff; }
  .cat-tag {
    position:absolute; bottom:8px; left:8px;
    background:rgba(0,0,0,0.7); border-radius:6px;
    padding:2px 8px; font-size:0.7rem; color:#fff; font-weight:600;
  }
  .card-body { padding: 0.9rem 1rem; }
  .card-title {
    font-weight:700; font-size:0.88rem; line-height:1.4;
    margin-bottom:0.4rem;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .card-meta { display:flex; justify-content:space-between; font-size:0.72rem; color:var(--muted); }
  .card-author { display:flex; align-items:center; gap:0.35rem; }
  .avatar {
    width:20px; height:20px; border-radius:50%;
    background:var(--gradient);
    display:flex; align-items:center; justify-content:center;
    font-size:0.58rem; font-weight:700; color:#fff; flex-shrink:0;
  }

  /* ── MODALS ── */
  .overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.88);
    backdrop-filter:blur(12px);
    z-index:500; align-items:center; justify-content:center; padding:1rem;
  }
  .overlay.open { display:flex; }

  /* ── ADD MODAL ── */
  .modal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; width:100%; max-width:460px;
    padding:1.8rem; position:relative;
    animation:scaleIn 0.22s ease; max-height:90vh; overflow-y:auto;
  }
  @keyframes scaleIn { from{opacity:0;transform:scale(0.94)} to{opacity:1;transform:scale(1)} }
  .modal-close {
    position:absolute; top:1rem; right:1rem;
    background:var(--surface2); border:none; color:var(--muted);
    border-radius:50%; width:30px; height:30px;
    cursor:pointer; font-size:1rem;
    display:flex; align-items:center; justify-content:center;
    transition:color 0.2s;
  }
  .modal-close:hover { color:var(--text); }
  .modal h2 {
    font-family:'Unbounded', sans-serif; font-size:1rem; margin-bottom:1.3rem;
    background:var(--gradient); -webkit-background-clip:text;
    -webkit-text-fill-color:transparent; background-clip:text;
  }
  .source-tabs { display:flex; gap:0.4rem; margin-bottom:1rem; }
  .src-tab {
    flex:1; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:0.45rem;
    text-align:center; font-size:0.75rem; font-weight:600;
    color:var(--muted); cursor:pointer; transition:all 0.2s;
  }
  .src-tab:hover { border-color:var(--muted); color:var(--text); }
  .src-tab.active { border-color:var(--accent2); color:var(--accent2); background:rgba(162,89,255,0.09); }
  .field { margin-bottom:0.9rem; }
  .field label { display:block; font-size:0.78rem; color:var(--muted); margin-bottom:0.35rem; font-weight:600; }
  .field input, .field textarea, .field select {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:0.65rem 0.9rem;
    color:var(--text); font-family:'Mulish',sans-serif; font-size:0.88rem;
    outline:none; transition:border-color 0.2s; resize:none;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color:var(--accent2); }
  .field select option { background:var(--surface2); }
  .field input::placeholder, .field textarea::placeholder { color:var(--muted); }
  .btn-submit {
    width:100%; background:var(--gradient); border:none;
    border-radius:10px; padding:0.78rem;
    color:#fff; font-family:'Unbounded',sans-serif;
    font-size:0.72rem; font-weight:700;
    cursor:pointer; margin-top:0.4rem; transition:opacity 0.2s;
  }
  .btn-submit:hover { opacity:0.9; }

  /* ── PLAYER MODAL ── */
  .player-modal {
    background:#000; border-radius:18px;
    width:100%; max-width:780px;
    position:relative; overflow:hidden;
    animation:scaleIn 0.22s ease;
    box-shadow: 0 30px 80px rgba(0,0,0,0.8);
  }

  /* Video area */
  .player-video-wrap {
    position:relative; aspect-ratio:9/16; /* vertical by default like VK mobile */
    max-height:72vh;
    background:#000;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  @media(min-width:600px) {
    .player-video-wrap { aspect-ratio:16/9; max-height:60vh; }
  }
  .player-video-wrap iframe, .player-video-wrap video {
    width:100%; height:100%; border:none; display:block;
  }

  /* Overlay controls (always visible at bottom, like screenshot) */
  .player-controls-overlay {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(transparent, rgba(0,0,0,0.85) 60%);
    padding:2.5rem 1rem 0.8rem;
    pointer-events:none;
  }
  .player-title-overlay {
    font-weight:700; font-size:0.88rem; line-height:1.4;
    margin-bottom:0.6rem;
    pointer-events:none;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }

  /* Progress bar */
  .player-progress-wrap {
    pointer-events:all;
    cursor:pointer; padding:6px 0; margin-bottom:0.5rem;
  }
  .player-progress-bg {
    height:3px; background:rgba(255,255,255,0.25); border-radius:3px; position:relative;
  }
  .player-progress-fill {
    position:absolute; left:0; top:0; height:100%;
    background:#fff; border-radius:3px;
    transition:width 0.1s linear;
  }
  .player-progress-dot {
    position:absolute; top:50%; transform:translate(-50%,-50%);
    width:11px; height:11px; border-radius:50%; background:#fff;
    box-shadow:0 0 0 2px rgba(255,255,255,0.3);
    transition:left 0.1s linear;
  }

  /* Bottom bar */
  .player-bar {
    pointer-events:all;
    display:flex; align-items:center; gap:0.8rem;
  }
  .player-btn {
    background:none; border:none; cursor:pointer;
    padding:4px; display:flex; align-items:center; justify-content:center;
    border-radius:50%; transition:background 0.15s;
  }
  .player-btn:hover { background:rgba(255,255,255,0.12); }
  .player-btn svg { width:22px; height:22px; fill:#fff; }
  .player-time {
    font-size:0.75rem; color:rgba(255,255,255,0.8);
    font-variant-numeric:tabular-nums; white-space:nowrap;
  }
  .player-spacer { flex:1; }
  .player-meta-bar {
    font-size:0.72rem; color:rgba(255,255,255,0.55);
  }

  /* IFrame-based player controls only shown for iframe */
  .iframe-controls { pointer-events:all; }

  /* Close on player */
  .player-close-btn {
    position:absolute; top:0.7rem; right:0.7rem;
    background:rgba(0,0,0,0.55); border:none;
    color:#fff; border-radius:50%; width:34px; height:34px;
    cursor:pointer; font-size:1rem; z-index:10;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(4px); transition:background 0.15s;
  }
  .player-close-btn:hover { background:rgba(0,0,0,0.8); }

  /* Info below player */
  .player-info-bar {
    background:var(--surface);
    padding:0.9rem 1.1rem;
    border-top:1px solid var(--border);
  }
  .player-info-title { font-weight:700; font-size:0.9rem; margin-bottom:0.25rem; }
  .player-info-meta { font-size:0.75rem; color:var(--muted); }

  /* ── EMPTY ── */
  .empty { grid-column:1/-1; text-align:center; padding:4rem 2rem; color:var(--muted); }
  .empty-icon { font-size:3rem; margin-bottom:1rem; }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:5rem; left:50%;
    transform:translateX(-50%) translateY(30px);
    background:var(--surface2); border:1px solid var(--border);
    border-radius:999px; padding:0.55rem 1.3rem;
    font-size:0.82rem; font-weight:600; color:var(--text);
    z-index:9000; opacity:0; transition:all 0.3s; pointer-events:none;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @media(max-width:500px) {
    .grid { grid-template-columns:1fr; padding:0 1rem 6rem; }
    nav { padding:0 1rem; gap:0.7rem; }
    .logo { font-size:1rem; }
  }
</style>
</head>
<body>

<!-- PWA Install Banner -->
<div id="pwaBanner">
  <div class="pwa-icon">▶️</div>
  <div class="pwa-text">
    <strong>Установить приложение</strong>
    <span>Добавьте ВИДЕО на главный экран</span>
  </div>
  <div class="pwa-btns">
    <button class="btn-pwa-install" id="pwaInstallBtn">Установить</button>
    <button class="btn-pwa-dismiss" onclick="dismissPWA()">✕</button>
  </div>
</div>

<!-- NAV -->
<nav>
  <div class="logo">▶ ВИДЕО</div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Поиск..." oninput="filterCards()">
  </div>
  <button class="btn-add" onclick="openAddModal()">+ Добавить</button>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Делись моментами</h1>
  <p>ВКонтакте и прямые видеоссылки — всё в одном месте</p>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="setTab('all',this)">Все</div>
  <div class="tab" onclick="setTab('vk',this)">ВКонтакте</div>
  <div class="tab" onclick="setTab('link',this)">Прямые ссылки</div>
</div>

<!-- GRID -->
<div class="grid" id="videoGrid"></div>

<!-- ADD MODAL -->
<div class="overlay" id="addOverlay" onclick="closeIfBg(event,'addOverlay')">
  <div class="modal">
    <button class="modal-close" onclick="closeAddModal()">✕</button>
    <h2>Добавить видео</h2>
    <div class="source-tabs">
      <div class="src-tab active" onclick="setSrc('vk',this)">ВКонтакте</div>
      <div class="src-tab" onclick="setSrc('link',this)">Прямая ссылка</div>
    </div>
    <div class="field">
      <label>Ссылка на видео</label>
      <input id="vidUrl" type="url" placeholder="https://vk.com/video...">
    </div>
    <div class="field">
      <label>Название</label>
      <input id="vidTitle" type="text" placeholder="Название видео">
    </div>
    <div class="field">
      <label>Автор / Никнейм</label>
      <input id="vidAuthor" type="text" placeholder="@username">
    </div>
    <div class="field">
      <label>Превью (URL картинки, необязательно)</label>
      <input id="vidThumb" type="url" placeholder="https://...jpg">
    </div>
    <div class="field">
      <label>Категория</label>
      <select id="vidCat">
        <option>Развлечения</option><option>Музыка</option>
        <option>Игры</option><option>Спорт</option>
        <option>Новости</option><option>Образование</option>
        <option>Технологии</option><option>Другое</option>
      </select>
    </div>
    <button class="btn-submit" onclick="addVideo()">Опубликовать</button>
  </div>
</div>

<!-- PLAYER MODAL -->
<div class="overlay" id="playerOverlay" onclick="closeIfBg(event,'playerOverlay')">
  <div class="player-modal" id="playerModal">
    <button class="player-close-btn" onclick="closePlayer()">✕</button>

    <div class="player-video-wrap" id="playerVideoWrap">
      <!-- filled by JS -->
    </div>

    <!-- Overlay controls (only shown for native video) -->
    <div class="player-controls-overlay" id="playerOverlayControls" style="display:none">
      <div class="player-title-overlay" id="playerOverlayTitle"></div>
      <div class="player-progress-wrap" id="progressWrap">
        <div class="player-progress-bg">
          <div class="player-progress-fill" id="progressFill" style="width:0%"></div>
          <div class="player-progress-dot" id="progressDot" style="left:0%"></div>
        </div>
      </div>
      <div class="player-bar">
        <button class="player-btn" id="playPauseBtn" onclick="togglePlay()">
          <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <span class="player-time" id="timeDisplay">0:00 / 0:00</span>
        <div class="player-spacer"></div>
        <button class="player-btn" onclick="toggleMute()">
          <svg id="muteIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        </button>
        <button class="player-btn" onclick="toggleFullscreen()">
          <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
      </div>
    </div>

    <div class="player-info-bar" id="playerInfoBar">
      <div class="player-info-title" id="playerInfoTitle"></div>
      <div class="player-info-meta" id="playerInfoMeta"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let currentSrc = 'vk';
let currentTab = 'all';
let activeVideo = null;
let deferredPrompt = null;

let videos = JSON.parse(localStorage.getItem('vids2') || 'null') || [
  {id:1, type:'vk', title:'Пример видео ВКонтакте — Баҳоначиларга жўнатамиз 😅👍', author:'Uzlayn', url:'https://vk.com/video-76982440_456239101', embed:'https://vk.com/video_ext.php?oid=-76982440&id=456239101&hd=2', thumb:'', cat:'Развлечения', date:'2024-02-16'},
];

function save() { localStorage.setItem('vids2', JSON.stringify(videos)); }

// ── RENDER ──
function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('videoGrid');
  let filtered = videos.filter(v => {
    if (currentTab !== 'all' && v.type !== currentTab) return false;
    if (q && !v.title.toLowerCase().includes(q) && !v.author.toLowerCase().includes(q)) return false;
    return true;
  });
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🎬</div><p>Видео не найдено. <b>Добавьте первое!</b></p></div>`;
    return;
  }
  grid.innerHTML = filtered.map((v,i) => `
    <div class="card" style="animation-delay:${i*0.05}s" onclick="openPlayer(${v.id})">
      <div class="thumb">
        ${v.thumb
          ? `<img src="${v.thumb}" alt="" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="thumb-placeholder">🎬</div>`}
        <div class="play-over">
          <div class="play-circle"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        </div>
        <span class="badge badge-${v.type}">${v.type==='vk'?'VK':'URL'}</span>
        <span class="cat-tag">${v.cat}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${v.title}</div>
        <div class="card-meta">
          <div class="card-author">
            <div class="avatar">${v.author[0].toUpperCase()}</div>${v.author}
          </div>
          <span>${fmtDate(v.date)}</span>
        </div>
      </div>
    </div>`).join('');
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
}
function filterCards() { render(); }
function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active'); render();
}

// ── ADD ──
function openAddModal() { document.getElementById('addOverlay').classList.add('open'); }
function closeAddModal() { document.getElementById('addOverlay').classList.remove('open'); }
function setSrc(src, el) {
  currentSrc = src;
  document.querySelectorAll('.src-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('vidUrl').placeholder = src === 'vk'
    ? 'https://vk.com/video...' : 'https://example.com/video.mp4';
}

function addVideo() {
  const url   = document.getElementById('vidUrl').value.trim();
  const title = document.getElementById('vidTitle').value.trim();
  const author= document.getElementById('vidAuthor').value.trim() || 'Аноним';
  const thumb = document.getElementById('vidThumb').value.trim();
  const cat   = document.getElementById('vidCat').value;
  if (!url || !title) { showToast('Заполните ссылку и название!'); return; }

  let embed = '';
  let type = currentSrc;

  if (type === 'vk') {
    const m = url.match(/video(-?\d+)_(\d+)/);
    if (!m) { showToast('Неверная ссылка ВКонтакте'); return; }
    embed = `https://vk.com/video_ext.php?oid=${m[1]}&id=${m[2]}&hd=2&autoplay=1`;
  } else {
    embed = url;
  }

  videos.unshift({ id: Date.now(), type, title, author, url, embed, thumb, cat, date: new Date().toISOString().slice(0,10) });
  save(); render(); closeAddModal();
  ['vidUrl','vidTitle','vidAuthor','vidThumb'].forEach(id => document.getElementById(id).value = '');
  showToast('Видео добавлено! 🎉');
}

// ── PLAYER ──
let nativeVideo = null;

function openPlayer(id) {
  const v = videos.find(x => x.id === id);
  if (!v) return;
  activeVideo = v;

  const vw = document.getElementById('playerVideoWrap');
  const oc = document.getElementById('playerOverlayControls');
  document.getElementById('playerInfoTitle').textContent = v.title;
  document.getElementById('playerInfoMeta').textContent = `${v.author} • ${v.cat} • ${fmtDate(v.date)}`;
  document.getElementById('playerOverlayTitle').textContent = v.title;

  if (v.type === 'link') {
    // Native video — show custom controls
    vw.innerHTML = `<video id="nativeVid" playsinline style="width:100%;height:100%;background:#000" src="${v.embed}"></video>`;
    nativeVideo = document.getElementById('nativeVid');
    nativeVideo.play().catch(()=>{});
    oc.style.display = 'block';
    bindVideoEvents();
  } else {
    // VK iframe — simple embed, overlay hidden
    vw.innerHTML = `<iframe src="${v.embed}" allowfullscreen allow="autoplay;encrypted-media" referrerpolicy="no-referrer-when-downgrade"></iframe>`;
    nativeVideo = null;
    oc.style.display = 'none';
  }

  document.getElementById('playerOverlay').classList.add('open');
}

function bindVideoEvents() {
  if (!nativeVideo) return;
  nativeVideo.addEventListener('timeupdate', updateProgress);
  nativeVideo.addEventListener('play', () => setPlayIcon(true));
  nativeVideo.addEventListener('pause', () => setPlayIcon(false));
  document.getElementById('progressWrap').addEventListener('click', seekVideo);
}

function updateProgress() {
  if (!nativeVideo || !nativeVideo.duration) return;
  const pct = (nativeVideo.currentTime / nativeVideo.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressDot').style.left = pct + '%';
  document.getElementById('timeDisplay').textContent = `${fmt(nativeVideo.currentTime)} / ${fmt(nativeVideo.duration)}`;
}

function fmt(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return `${m}:${sec<10?'0':''}${sec}`;
}

function seekVideo(e) {
  if (!nativeVideo) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  nativeVideo.currentTime = ratio * nativeVideo.duration;
}

function togglePlay() {
  if (!nativeVideo) return;
  nativeVideo.paused ? nativeVideo.play() : nativeVideo.pause();
}
function setPlayIcon(playing) {
  document.getElementById('playIcon').innerHTML = playing
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}
function toggleMute() {
  if (!nativeVideo) return;
  nativeVideo.muted = !nativeVideo.muted;
  document.getElementById('muteIcon').innerHTML = nativeVideo.muted
    ? '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>'
    : '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>';
}
function toggleFullscreen() {
  const el = document.getElementById('playerModal');
  if (document.fullscreenElement) document.exitFullscreen();
  else el.requestFullscreen?.();
}

function closePlayer() {
  document.getElementById('playerOverlay').classList.remove('open');
  document.getElementById('playerVideoWrap').innerHTML = '';
  document.getElementById('playerOverlayControls').style.display = 'none';
  nativeVideo = null;
}
function closeIfBg(e, id) {
  if (e.target === document.getElementById(id)) {
    if (id === 'playerOverlay') closePlayer();
    else document.getElementById(id).classList.remove('open');
  }
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── PWA ──
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('pwaDismissed')) {
    document.getElementById('pwaBanner').classList.add('show');
  }
});

document.getElementById('pwaInstallBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('pwaBanner').classList.remove('show');
  if (outcome === 'accepted') showToast('Приложение установлено! 🎉');
});

function dismissPWA() {
  document.getElementById('pwaBanner').classList.remove('show');
  localStorage.setItem('pwaDismissed','1');
}

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// ── INIT ──
render();
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeAddModal(); closePlayer(); }
  if (e.key === ' ' && activeVideo) { e.preventDefault(); togglePlay(); }
});
</script>
</body>
</html>
