<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ВИДЕО — Делись моментами</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Mulish:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1c1c2a;
    --border: #2a2a3d;
    --accent: #ff3b6b;
    --accent2: #a259ff;
    --text: #f0f0f8;
    --muted: #7070a0;
    --card-hover: #1f1f30;
    --gradient: linear-gradient(135deg, #ff3b6b, #a259ff);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Mulish', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* ── NAV ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    height: 64px;
  }

  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.3rem;
    font-weight: 900;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    white-space: nowrap;
  }

  .search-wrap {
    flex: 1;
    max-width: 500px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.5rem 1.2rem;
    color: var(--text);
    font-family: 'Mulish', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap input::placeholder { color: var(--muted); }

  .nav-right { display: flex; align-items: center; gap: 1rem; margin-left: auto; }

  .btn-add {
    background: var(--gradient);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 0.55rem 1.4rem;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-add:hover { opacity: 0.9; transform: scale(1.04); }

  /* ── HERO ── */
  .hero {
    padding: 4rem 2rem 3rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(162,89,255,0.12) 0%, transparent 70%);
    top: -200px; left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
  }
  .hero h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 900;
    line-height: 1.1;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.8rem;
  }
  .hero p { color: var(--muted); font-size: 1rem; max-width: 400px; margin: 0 auto; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0.5rem;
    padding: 0 2rem 1.5rem;
    overflow-x: auto;
  }
  .tab {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.4rem 1.1rem;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .tab:hover { border-color: var(--accent2); color: var(--text); }
  .tab.active {
    background: var(--gradient);
    border-color: transparent;
    color: #fff;
    font-weight: 600;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
    padding: 0 2rem 4rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.5s ease both;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent2);
    box-shadow: 0 16px 40px rgba(162,89,255,0.12);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .thumb {
    position: relative;
    aspect-ratio: 16/9;
    background: var(--surface2);
    overflow: hidden;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem;
    background: linear-gradient(135deg, var(--surface2), #1a1a28);
  }
  .play-btn {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.3);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover .play-btn { opacity: 1; }
  .play-btn svg { width: 48px; height: 48px; fill: #fff; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); }

  .badge {
    position: absolute;
    top: 8px; right: 8px;
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-yt { background: #ff0000; color: #fff; }
  .badge-vk { background: #0077ff; color: #fff; }
  .badge-link { background: var(--accent); color: #fff; }

  .duration {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.75);
    border-radius: 6px;
    padding: 2px 7px;
    font-size: 0.75rem;
    font-weight: 600;
    color: #fff;
  }

  .card-body { padding: 1rem; }
  .card-title {
    font-weight: 700;
    font-size: 0.9rem;
    line-height: 1.4;
    margin-bottom: 0.4rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .card-author { display: flex; align-items: center; gap: 0.4rem; }
  .avatar {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--gradient);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  /* ── MODAL OVERLAY ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .overlay.open { display: flex; }

  /* ── ADD VIDEO MODAL ── */
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 500px;
    padding: 2rem;
    position: relative;
    animation: scaleIn 0.25s ease;
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }
  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: var(--surface2);
    border: none;
    color: var(--muted);
    border-radius: 50%;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text); }

  .modal h2 {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.1rem;
    margin-bottom: 1.5rem;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; font-weight: 600; }
  .field input, .field textarea, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-family: 'Mulish', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent2); }
  .field select option { background: var(--surface2); }
  .field input::placeholder, .field textarea::placeholder { color: var(--muted); }

  .source-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .src-tab {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem;
    text-align: center;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .src-tab:hover { border-color: var(--muted); color: var(--text); }
  .src-tab.active { border-color: var(--accent2); color: var(--accent2); background: rgba(162,89,255,0.08); }

  .btn-submit {
    width: 100%;
    background: var(--gradient);
    border: none;
    border-radius: 10px;
    padding: 0.8rem;
    color: #fff;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.2s;
  }
  .btn-submit:hover { opacity: 0.9; }

  /* ── PLAYER MODAL ── */
  .player-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 800px;
    position: relative;
    animation: scaleIn 0.25s ease;
    overflow: hidden;
  }
  .player-wrap {
    position: relative;
    aspect-ratio: 16/9;
    background: #000;
  }
  .player-wrap iframe {
    width: 100%; height: 100%;
    border: none;
  }
  .player-info { padding: 1.2rem 1.5rem 1.5rem; }
  .player-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
  }
  .player-meta { font-size: 0.8rem; color: var(--muted); }

  /* ── EMPTY STATE ── */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty p { font-size: 0.9rem; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.6rem 1.4rem;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    z-index: 9000;
    transition: transform 0.3s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media(max-width: 600px) {
    .hero h1 { font-size: 1.8rem; }
    .grid { grid-template-columns: 1fr; padding: 0 1rem 4rem; }
    nav { padding: 0 1rem; gap: 0.8rem; }
    .logo { font-size: 1rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">▶ ВИДЕО</div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Поиск видео..." oninput="filterCards()">
  </div>
  <div class="nav-right">
    <button class="btn-add" onclick="openAddModal()">+ Добавить</button>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Делись моментами</h1>
  <p>YouTube, ВКонтакте и прямые ссылки — всё в одном месте</p>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="setTab('all', this)">Все</div>
  <div class="tab" onclick="setTab('youtube', this)">YouTube</div>
  <div class="tab" onclick="setTab('vk', this)">ВКонтакте</div>
  <div class="tab" onclick="setTab('link', this)">Прямые ссылки</div>
</div>

<!-- GRID -->
<div class="grid" id="videoGrid"></div>

<!-- ADD MODAL -->
<div class="overlay" id="addOverlay" onclick="closeIfBg(event, 'addOverlay')">
  <div class="modal">
    <button class="modal-close" onclick="closeAddModal()">✕</button>
    <h2>Добавить видео</h2>

    <div class="source-tabs">
      <div class="src-tab active" onclick="setSrc('youtube', this)">YouTube</div>
      <div class="src-tab" onclick="setSrc('vk', this)">ВКонтакте</div>
      <div class="src-tab" onclick="setSrc('link', this)">Ссылка</div>
    </div>

    <div class="field">
      <label>Ссылка на видео</label>
      <input id="vidUrl" type="url" placeholder="https://...">
    </div>
    <div class="field">
      <label>Название</label>
      <input id="vidTitle" type="text" placeholder="Моё крутое видео">
    </div>
    <div class="field">
      <label>Автор / Ваш никнейм</label>
      <input id="vidAuthor" type="text" placeholder="@username">
    </div>
    <div class="field">
      <label>Категория</label>
      <select id="vidCat">
        <option value="Развлечения">Развлечения</option>
        <option value="Музыка">Музыка</option>
        <option value="Игры">Игры</option>
        <option value="Спорт">Спорт</option>
        <option value="Новости">Новости</option>
        <option value="Образование">Образование</option>
        <option value="Технологии">Технологии</option>
        <option value="Другое">Другое</option>
      </select>
    </div>
    <div class="field">
      <label>Описание (необязательно)</label>
      <textarea id="vidDesc" rows="2" placeholder="Коротко о видео..."></textarea>
    </div>
    <button class="btn-submit" onclick="addVideo()">Опубликовать видео</button>
  </div>
</div>

<!-- PLAYER MODAL -->
<div class="overlay" id="playerOverlay" onclick="closeIfBg(event, 'playerOverlay')">
  <div class="player-modal">
    <button class="modal-close" style="top:0.8rem;right:0.8rem;z-index:10" onclick="closePlayer()">✕</button>
    <div class="player-wrap" id="playerWrap"></div>
    <div class="player-info">
      <div class="player-title" id="playerTitle"></div>
      <div class="player-meta" id="playerMeta"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let currentSrc = 'youtube';
let currentTab = 'all';

let videos = JSON.parse(localStorage.getItem('vids') || 'null') || [
  {id:1, type:'youtube', title:'Big Buck Bunny — Мультфильм с открытым исходным кодом', author:'Blender', url:'https://www.youtube.com/watch?v=aqz-KE-bpKQ', embed:'https://www.youtube.com/embed/aqz-KE-bpKQ', thumb:'https://img.youtube.com/vi/aqz-KE-bpKQ/mqdefault.jpg', cat:'Развлечения', date:'2024-01-10'},
  {id:2, type:'youtube', title:'Lofi Hip Hop Radio — Beats to study/relax to 🎵', author:'ChillBeats', url:'https://www.youtube.com/watch?v=jfKfPfyJRdk', embed:'https://www.youtube.com/embed/jfKfPfyJRdk', thumb:'https://img.youtube.com/vi/jfKfPfyJRdk/mqdefault.jpg', cat:'Музыка', date:'2024-02-05'},
  {id:3, type:'vk', title:'Клип ВКонтакте — Пример видео VK', author:'vk_user', url:'https://vk.com/video-76982440_456239101', embed:'https://vk.com/video_ext.php?oid=-76982440&id=456239101&hd=2', thumb:'', cat:'Музыка', date:'2024-03-01'},
];

function save() { localStorage.setItem('vids', JSON.stringify(videos)); }

// ── RENDER ──
function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('videoGrid');
  let filtered = videos.filter(v => {
    if (currentTab !== 'all' && v.type !== currentTab) return false;
    if (q && !v.title.toLowerCase().includes(q) && !v.author.toLowerCase().includes(q)) return false;
    return true;
  });

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🎬</div><p>Видео не найдено. <b>Добавьте первое!</b></p></div>`;
    return;
  }

  grid.innerHTML = filtered.map((v,i) => `
    <div class="card" style="animation-delay:${i*0.05}s" onclick="openPlayer(${v.id})">
      <div class="thumb">
        ${v.thumb
          ? `<img src="${v.thumb}" alt="${v.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=thumb-placeholder>🎬</div>'">`
          : `<div class="thumb-placeholder">🎬</div>`}
        <div class="play-btn">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <span class="badge badge-${v.type}">${v.type === 'youtube' ? 'YT' : v.type === 'vk' ? 'VK' : 'URL'}</span>
        <span class="duration">${v.cat}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${v.title}</div>
        <div class="card-meta">
          <div class="card-author">
            <div class="avatar">${v.author[0].toUpperCase()}</div>
            ${v.author}
          </div>
          <span>${fmtDate(v.date)}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function fmtDate(d) {
  const dt = new Date(d);
  return dt.toLocaleDateString('ru-RU', {day:'numeric', month:'short', year:'numeric'});
}

function filterCards() { render(); }

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── ADD MODAL ──
function openAddModal() {
  document.getElementById('addOverlay').classList.add('open');
}
function closeAddModal() {
  document.getElementById('addOverlay').classList.remove('open');
}
function setSrc(src, el) {
  currentSrc = src;
  document.querySelectorAll('.src-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const hints = {
    youtube: 'https://www.youtube.com/watch?v=...',
    vk: 'https://vk.com/video123456_789...',
    link: 'https://example.com/video.mp4'
  };
  document.getElementById('vidUrl').placeholder = hints[src];
}

function addVideo() {
  const url = document.getElementById('vidUrl').value.trim();
  const title = document.getElementById('vidTitle').value.trim();
  const author = document.getElementById('vidAuthor').value.trim() || 'Аноним';
  const cat = document.getElementById('vidCat').value;
  const desc = document.getElementById('vidDesc').value.trim();

  if (!url || !title) { showToast('Заполните ссылку и название!'); return; }

  let embed = '';
  let thumb = '';
  let type = currentSrc;

  if (type === 'youtube') {
    const ytId = extractYTId(url);
    if (!ytId) { showToast('Неверная ссылка YouTube'); return; }
    embed = `https://www.youtube.com/embed/${ytId}?autoplay=1`;
    thumb = `https://img.youtube.com/vi/${ytId}/mqdefault.jpg`;
  } else if (type === 'vk') {
    const vkInfo = extractVKInfo(url);
    if (!vkInfo) { showToast('Неверная ссылка ВКонтакте'); return; }
    embed = `https://vk.com/video_ext.php?oid=${vkInfo.oid}&id=${vkInfo.id}&hd=2&autoplay=1`;
    thumb = '';
  } else {
    embed = url;
  }

  const video = {
    id: Date.now(),
    type,
    title,
    author,
    url,
    embed,
    thumb,
    cat,
    desc,
    date: new Date().toISOString().slice(0,10)
  };

  videos.unshift(video);
  save();
  render();
  closeAddModal();
  clearForm();
  showToast('Видео добавлено! 🎉');
}

function extractYTId(url) {
  const rx = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
  const m = url.match(rx);
  return m ? m[1] : null;
}

function extractVKInfo(url) {
  // e.g. https://vk.com/video-76982440_456239101
  const m = url.match(/video(-?\d+)_(\d+)/);
  if (m) return { oid: m[1], id: m[2] };
  return null;
}

function clearForm() {
  ['vidUrl','vidTitle','vidAuthor','vidDesc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('vidCat').selectedIndex = 0;
}

// ── PLAYER ──
function openPlayer(id) {
  const v = videos.find(x => x.id === id);
  if (!v) return;

  const wrap = document.getElementById('playerWrap');
  document.getElementById('playerTitle').textContent = v.title;
  document.getElementById('playerMeta').textContent = `${v.author} • ${v.cat} • ${fmtDate(v.date)}`;

  if (v.type === 'link') {
    wrap.innerHTML = `<video controls autoplay style="width:100%;height:100%;background:#000">
      <source src="${v.embed}">
      Ваш браузер не поддерживает видео.
    </video>`;
  } else {
    wrap.innerHTML = `<iframe src="${v.embed}" allowfullscreen allow="autoplay; encrypted-media" referrerpolicy="no-referrer-when-downgrade"></iframe>`;
  }

  document.getElementById('playerOverlay').classList.add('open');
}

function closePlayer() {
  document.getElementById('playerOverlay').classList.remove('open');
  document.getElementById('playerWrap').innerHTML = '';
}

function closeIfBg(e, id) {
  if (e.target === document.getElementById(id)) {
    document.getElementById(id).classList.remove('open');
    if (id === 'playerOverlay') document.getElementById('playerWrap').innerHTML = '';
  }
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── INIT ──
render();

// ESC closes modals
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeAddModal();
    closePlayer();
  }
});
</script>
