<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>

<link rel="manifest" href="manifest.json"/>

<meta name="apple-mobile-web-app-capable" content="yes"/>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

try {

<style>
*{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
body{background:#09090f;color:#f0f0fa;font-family:system-ui, -apple-system, sans-serif;min-height:100vh;overflow-x:hidden;}

/* NAV */
nav{background:rgba(9,9,15,.97);border-bottom:1px solid #18182a;padding:0 14px;height:56px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:1000}
.logo{font-weight:900;font-size:18px;background:linear-gradient(135deg,#5b8cff,#a259ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-name{font-size:12px;color:#7070a0;margin-left:4px;font-weight:600}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.icon-btn{width:38px;height:38px;border-radius:50%;background:#13131e;border:1px solid #20202e;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.icon-btn svg{width:20px;height:20px;stroke:#7070a0;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icon-btn:active{transform:scale(0.9)}
.icon-btn.on{background:linear-gradient(135deg,#5b8cff,#a259ff);border-color:transparent}
.icon-btn.on svg{stroke:#fff}

/* DROPDOWN */
#dropdown { display:none; position:fixed; top:60px; right:14px; z-index:2000; pointer-events: auto; }
.dropdown{background:#13131e;border:1px solid #2a2a3e;border-radius:12px;padding:7px;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,0.8);animation:su .2s ease-out}
@keyframes su{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.dd-head{padding:10px 12px;border-bottom:1px solid #1e1e2e;margin-bottom:5px}
.dd-name{font-size:14px;font-weight:700;color:#fff}
.dd-role{font-size:10px;color:#5b8cff;text-transform:uppercase;margin-top:2px;letter-spacing:0.5px}
.dd-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#c0c0e0;transition:background .15s}
.dd-item:hover{background:rgba(255,255,255,0.05)}
.dd-item.red{color:#ff6060}

/* ADMIN PANEL */
#adminPanel{display:none;background:#0c0c18;border-bottom:2px solid #1a1a30}
#adminPanel.open{display:block}
.atabs{display:flex;border-bottom:1px solid #1a1a2e;overflow-x:auto;scrollbar-width:none}
.atabs::-webkit-scrollbar{display:none}
.atab{padding:14px 18px;font-size:12px;font-weight:700;color:#404060;cursor:pointer;white-space:nowrap;border:none;background:none;border-bottom:2px solid transparent;transition:0.2s}
.atab.on{color:#5b8cff;border-bottom-color:#5b8cff}
.acontent{padding:16px}
.apage{display:none}
.apage.on{display:block}

/* GRID & CARDS */
.section{padding:16px 14px 30px}
.sec-h{font-size:15px;font-weight:800;margin-bottom:14px;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.card{border-radius:12px;overflow:hidden;background:#111120;border:1px solid #18182a;cursor:pointer;transition:all 0.2s}
.ct{width:100%;aspect-ratio:16/9;background:#060612;position:relative}
.ct img{width:100%;height:100%;object-fit:cover}
.ov{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:0.2s}
.card:active .ov{background:rgba(0,0,0,0.4)}
.cb{padding:10px}
.ct2{font-size:12px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:#e0e0f0}
.cd{font-size:10px;color:#505070;margin-top:5px}

/* FULLSCREEN PLAYER */
#fsWrap{position:fixed;inset:0;background:#000;z-index:5000;display:none;flex-direction:column}
#fsWrap.on{display:flex}
#fsSlide{flex:1;position:relative;overflow:hidden;touch-action:none}
.fs-topbar{position:absolute;top:0;left:0;right:0;padding:14px;z-index:10;display:flex;align-items:center}
.fs-back{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.5);border:none;display:flex;align-items:center;justify-content:center}
.fs-back svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.5}

/* MODALS */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9000;display:none;align-items:center;justify-content:center;padding:20px}
.mbox{background:#13131e;border:1px solid #2a2a3e;border-radius:20px;padding:24px;width:100%;max-width:400px;position:relative}

/* FORMS */
.f{margin-bottom:14px}
.f label{font-size:11px;color:#7070a0;display:block;margin-bottom:5px;text-transform:uppercase;font-weight:700}
.mi, .sel, textarea{width:100%;background:#0d0d18;border:1px solid #20202e;color:#fff;padding:12px;border-radius:10px;font-size:14px;outline:none}
.btn{padding:12px;border-radius:10px;border:none;font-weight:700;cursor:pointer;width:100%;font-size:14px}
.btn-p{background:linear-gradient(135deg,#5b8cff,#a259ff);color:#fff}

/* Helpers */
.hint{font-size:11px;color:#404060;margin-top:4px}
.tbadge{position:absolute;bottom:6px;right:6px;font-size:9px;font-weight:900;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.tbadge.vk{background:rgba(91,140,255,0.2);color:#5b8cff}
.tbadge.mp4{background:rgba(0,255,120,0.15);color:#00ff78}

@media(max-width:480px){ .grid{grid-template-columns: 1fr 1fr;} }
</style>
</head>
<body>

<nav>
  <div class="logo">▶ UZLAYN TV</div>
  <span class="nav-name" id="navName"></span>
  <div class="nav-right">
    <div class="icon-btn" id="btnUpload" onclick="openUpload()" title="Добавить">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div class="icon-btn" id="btnUser" onclick="toggleDrop(event)" title="Профиль">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
  </div>
</nav>

<div id="dropdown">
  <div class="dropdown">
    <div class="dd-head">
      <div class="dd-name" id="udName">—</div>
      <div class="dd-role" id="udRole">—</div>
    </div>
    <div class="dd-item" id="udAdminLink" style="display:none" onclick="scrollToAdmin()">⚙️ Панель управления</div>
    <div class="dd-item red" onclick="doLogout()">🚪 Выйти из аккаунта</div>
  </div>
</div>

<div id="adminPanel">
  <div class="atabs">
    <button class="atab on" onclick="aTab(this,'aVideos')">📋 СПИСОК</button>
    <button class="atab" onclick="aTab(this,'aAdd')">➕ ДОБАВИТЬ</button>
    <button class="atab" onclick="aTab(this,'aAds')">📢 РЕКЛАМА</button>
  </div>
  <div class="acontent">
    <div class="apage on" id="aVideos"><div id="aVidList"></div></div>
    <div class="apage" id="aAdd">
        <div class="f"><label>Название</label><input type="text" id="aT" placeholder="Название видео"/></div>
        <div class="f"><label>Тип</label>
            <select class="sel" id="aTy">
              <option value="mp4">🎬 MP4 (Прямая ссылка)</option>
              <option value="m3u8">📡 M3U8 (HLS Стрим)</option>
              <option value="vk">📱 VK Видео / Клип</option>
              <option value="yadisk">💾 Яндекс Диск</option>
            </select>
        </div>
        <div class="f"><label>URL Ссылка</label><input type="text" id="aU" placeholder="https://..."/></div>
        <button class="btn btn-p" onclick="adminAdd()">Опубликовать</button>
    </div>
    <div class="apage" id="aAds">
        <div class="f"><label>Код рекламы (Top)</label><textarea id="adT" rows="3"></textarea></div>
        <button class="btn btn-p" onclick="saveAds()">Сохранить настройки</button>
    </div>
  </div>
</div>

<div class="section">
  <div class="sec-h" id="gridTitle">📺 Лента видео</div>
  <div id="grid"></div>
</div>

<div id="fsWrap">
  <div id="fsSlide"></div>
</div>

<div class="mbg" id="authModal" onclick="if(event.target===this)closeAuth()">
  <div class="mbox">
    <div id="vLogin">
      <h2 style="margin-bottom:5px">👋 Войти</h2>
      <p style="font-size:12px;color:#7070a0;margin-bottom:20px">Доступ к вашим видео</p>
      <div id="loginErr" style="color:#ff6060;font-size:12px;margin-bottom:10px;display:none"></div>
      <input class="mi" style="margin-bottom:10px" type="text" id="lUser" placeholder="Логин"/>
      <input class="mi" style="margin-bottom:15px" type="password" id="lPass" placeholder="Пароль"/>
      <button class="btn btn-p" onclick="doLogin()">Войти</button>
      <p style="text-align:center;font-size:12px;margin-top:15px">Нет аккаунта? <a href="#" onclick="showV('vReg')" style="color:#5b8cff">Создать</a></p>
    </div>
    <div id="vReg" style="display:none">
        <h2>📝 Регистрация</h2>
        <input class="mi" style="margin-top:15px;margin-bottom:10px" type="text" id="rUser" placeholder="Придумайте логин"/>
        <input class="mi" style="margin-bottom:15px" type="password" id="rPass" placeholder="Пароль (мин. 6 символов)"/>
        <button class="btn btn-p" onclick="doReg()">Зарегистрироваться</button>
        <p style="text-align:center;font-size:12px;margin-top:15px">Есть аккаунт? <a href="#" onclick="showV('vLogin')" style="color:#5b8cff">Войти</a></p>
    </div>
  </div>
</div>

<div class="mbg" id="uploadModal" onclick="if(event.target===this)closeUpload()">
    <div class="mbox">
        <h2 style="margin-bottom:15px">🚀 Новое видео</h2>
        <input class="mi" style="margin-bottom:10px" type="text" id="uT" placeholder="Название"/>
        <select class="sel" style="margin-bottom:10px" id="uTy">
            <option value="mp4">🎬 MP4</option>
            <option value="vk">📱 VK Видео</option>
            <option value="m3u8">📡 HLS Стрим</option>
        </select>
        <input class="mi" style="margin-bottom:15px" type="text" id="uU" placeholder="Ссылка на видео"/>
        <button class="btn btn-p" onclick="submitVid()">Опубликовать сейчас</button>
    </div>
</div>

<script>
var ADMIN_EMAIL = 'uzlayn.admin@gmail.com';
var videos=[], activeId=null, nextId=Date.now();
var currentUser=null, isAdmin=false, dropOpen=false;

function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(m){ alert(m); }

// --- AUTH LOGIC ---
function toggleDrop(e){
  e.stopPropagation();
  if(!currentUser){ openAuth(); return; }
  dropOpen = !dropOpen;
  document.getElementById('dropdown').style.display = dropOpen ? 'block' : 'none';
}

document.addEventListener('click', function(){
  dropOpen = false;
  document.getElementById('dropdown').style.display = 'none';
});

function openAuth(){ document.getElementById('authModal').style.display='flex'; }
function closeAuth(){ document.getElementById('authModal').style.display='none'; }
function showV(id){
  document.getElementById('vLogin').style.display = (id==='vLogin'?'block':'none');
  document.getElementById('vReg').style.display = (id==='vReg'?'block':'none');
}

function doLogin(){
  var login=document.getElementById('lUser').value.trim();
  var pass=document.getElementById('lPass').value;
  if(!login || !pass) return;
  var email = login.includes('@') ? login : login + '@uzlayn.tv';
  auth.signInWithEmailAndPassword(email, pass).then(closeAuth).catch(function(e){ alert('Ошибка входа'); });
}

function doReg(){
  var login=document.getElementById('rUser').value.trim();
  var pass=document.getElementById('rPass').value;
  if(login.length < 3 || pass.length < 6) { alert('Логин от 3, пароль от 6 символов'); return; }
  var email = login + '@uzlayn.tv';
  auth.createUserWithEmailAndPassword(email, pass).then(function(c){
    return c.user.updateProfile({displayName: login});
  }).then(closeAuth).catch(function(e){ alert('Логин занят или ошибка'); });
}

function doLogout(){ auth.signOut(); }

auth.onAuthStateChanged(function(user){
  if(user){
    currentUser = { login: user.displayName || user.email.split('@')[0], role: user.email===ADMIN_EMAIL?'admin':'user' };
    isAdmin = (currentUser.role === 'admin');
    document.getElementById('navName').textContent = currentUser.login;
    document.getElementById('udName').textContent = currentUser.login;
    document.getElementById('udRole').textContent = isAdmin ? 'Администратор' : 'Пользователь';
    document.getElementById('udAdminLink').style.display = isAdmin ? 'block' : 'none';
    document.getElementById('adminPanel').classList.toggle('open', isAdmin);
  } else {
    currentUser = null; isAdmin = false;
    document.getElementById('navName').textContent = '';
    document.getElementById('adminPanel').classList.remove('open');
  }
  loadVideos();
});

// --- VIDEO LOGIC ---
function loadVideos(){
  db.collection('videos').orderBy('addedAt','desc').onSnapshot(function(snap){
    videos=[];
    snap.forEach(function(doc){ videos.push(Object.assign({}, doc.data(), {fbId: doc.id})); });
    renderGrid();
    if(isAdmin) renderAdminList();
  });
}

function renderGrid(){
  var g = document.getElementById('grid');
  if(!videos.length){ g.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:40px;color:#404060">Тут пока пусто...</p>'; return; }
  g.innerHTML = videos.map(function(v, i){
    return '<div class="card" onclick="openFs('+i+')">' +
           '<div class="ct">' +
           (v.thumb ? '<img src="'+escH(v.thumb)+'">' : '<div style="height:100%;display:flex;align-items:center;justify-content:center;font-size:30px">🎬</div>') +
           '<div class="ov"><svg width="40" height="40" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg></div>' +
           '<div class="tbadge '+v.type+'">'+v.type+'</div>' +
           '</div>' +
           '<div class="cb"><div class="ct2">'+escH(v.title)+'</div><div class="cd">@'+(v.addedBy||'admin')+'</div></div>' +
           '</div>';
  }).join('');
}

function renderAdminList(){
  var el = document.getElementById('aVidList');
  el.innerHTML = videos.map(function(v){
    return '<div style="background:#131320;padding:10px;border-radius:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px;border:1px solid #1e1e2e">' +
           '<div style="flex:1;font-size:13px"><b>'+escH(v.title)+'</b><br><small style="color:#5b8cff">'+v.type+'</small></div>' +
           '<button onclick="delVid(\''+v.fbId+'\')" style="background:#ff4f6a;color:#fff;border:none;padding:6px 10px;border-radius:6px;font-size:11px">УДАЛИТЬ</button>' +
           '</div>';
  }).join('');
}

function delVid(fid){ if(confirm('Удалить?')) db.collection('videos').doc(fid).delete(); }

function adminAdd(){
  var t=document.getElementById('aT').value, ty=document.getElementById('aTy').value, u=document.getElementById('aU').value;
  if(!t||!u) return;
  db.collection('videos').add({ title:t, type:ty, url:u, addedAt:Date.now(), addedBy:'admin' });
  document.getElementById('aT').value=''; document.getElementById('aU').value='';
  toast('Добавлено!');
}

function openUpload(){ if(!currentUser) openAuth(); else document.getElementById('uploadModal').style.display='flex'; }
function closeUpload(){ document.getElementById('uploadModal').style.display='none'; }
function submitVid(){
  var t=document.getElementById('uT').value, ty=document.getElementById('uTy').value, u=document.getElementById('uU').value;
  if(!t||!u) return;
  db.collection('videos').add({ title:t, type:ty, url:u, addedAt:Date.now(), addedBy:currentUser.login });
  closeUpload();
}

function aTab(btn, id){
  document.querySelectorAll('.atab').forEach(function(t){t.classList.remove('on')});
  document.querySelectorAll('.apage').forEach(function(p){p.classList.remove('on')});
  btn.classList.add('on'); document.getElementById(id).classList.add('on');
}

function scrollToAdmin(){ document.getElementById('adminPanel').scrollIntoView({behavior:'smooth'}); }

// --- PLAYER ---
var hlsPlayer = null;
function openFs(idx){
  var v = videos[idx]; if(!v) return;
  var wrap = document.getElementById('fsWrap');
  wrap.classList.add('on');
  var slide = document.getElementById('fsSlide');
  
  var content = '';
  if(v.type==='vk'){
    var emb = v.url.includes('video_ext.php') ? v.url : 'https://vk.com/video_ext.php?oid=-'+v.url.match(/video(-?\d+)_(\d+)/)[1]+'&id='+v.url.match(/video(-?\d+)_(\d+)/)[2]+'&hd=2&autoplay=1';
    content = '<iframe src="'+emb+'" style="width:100%;height:100%;border:none"></iframe>';
  } else {
    content = '<video id="mainVid" controls autoplay playsinline style="width:100%;height:100%;object-fit:contain"></video>';
  }

  slide.innerHTML = '<div class="fs-topbar"><button class="fs-back" onclick="closeFs()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></button></div>' + content;
  
  if(v.type!=='vk'){
    var vid = document.getElementById('mainVid');
    if(v.type==='m3u8' && Hls.isSupported()){
      hlsPlayer = new Hls(); hlsPlayer.loadSource(v.url); hlsPlayer.attachMedia(vid);
    } else {
      vid.src = v.url;
    }
  }
}

function closeFs(){
  if(hlsPlayer){ hlsPlayer.destroy(); hlsPlayer=null; }
  document.getElementById('fsWrap').classList.remove('on');
  document.getElementById('fsSlide').innerHTML = '';
}
</script>
</body>
</html>
